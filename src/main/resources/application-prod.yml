spring:
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/egag?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8&allowPublicKeyRetrieval=true
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${DB_USERNAME:egag}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:}
            client-secret: ${GOOGLE_CLIENT_SECRET:}
            scope: email, profile
          kakao:
            client-id: ${KAKAO_CLIENT_ID:}
            client-authentication-method: client_secret_post
            authorization-grant-type: authorization_code
            redirect-uri: "${APP_BASE_URL}/login/oauth2/code/kakao"
            client-name: Kakao
            scope:
              - profile_nickname
              - account_email
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

jwt:
  secret: ${JWT_SECRET}
  access-expiration: 900000
  refresh-expiration: 604800000

cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME:}
  api-key: ${CLOUDINARY_API_KEY:}
  api-secret: ${CLOUDINARY_API_SECRET:}

openai:
  api-key: ${OPENAI_API_KEY:}

kakao:
  client-id: ${KAKAO_CLIENT_ID:}
  redirect-uri: ${APP_BASE_URL}/api/auth/kakao/callback

kakaopay:
  secret-key: ${KAKAOPAY_SECRET_KEY:}
  cid: ${KAKAOPAY_CID:TC0ONETIME}

tosspay:
  secret-key: ${TOSS_SECRET_KEY:}

portone:
  api-key: ${PORTONE_API_KEY:}
  api-secret: ${PORTONE_API_SECRET:}

resend:
  api-key: ${RESEND_API_KEY:}
  from: ${RESEND_FROM:noreply@yourdomain.com}

app:
  base-url: ${APP_BASE_URL:http://localhost:8080}

server:
  port: 8080
